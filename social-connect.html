<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חיבור רשתות חברתיות</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f1117;
    color: #e8e8e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #error-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
    padding: 32px;
    text-align: center;
  }

  #error-screen .icon {
    font-size: 48px;
  }

  #error-screen h2 {
    font-size: 20px;
    font-weight: 600;
    color: #ff6b6b;
  }

  #error-screen p {
    font-size: 14px;
    color: #888;
    max-width: 360px;
    line-height: 1.6;
  }

  #loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #333;
    border-top-color: #4f8ef7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading-screen p {
    font-size: 14px;
    color: #666;
  }

  #main {
    display: none;
    flex-direction: column;
    height: 100vh;
  }

  iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }

  #success-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
    padding: 32px;
    text-align: center;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  #success-screen .checkmark {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #1a3a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  #success-screen h2 {
    font-size: 22px;
    font-weight: 600;
    color: #4ade80;
  }

  #success-screen p {
    font-size: 14px;
    color: #888;
    max-width: 320px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <p>טוען את ממשק החיבור...</p>
</div>

<div id="error-screen">
  <div class="icon">⚠️</div>
  <h2>לא ניתן לטעון את הדף</h2>
  <p id="error-msg">לא נמצא קישור JWT תקין. אנא פנה לתמיכה.</p>
</div>

<div id="main">
  <iframe id="jwt-frame" sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-top-navigation-by-user-activation"></iframe>
</div>

<div id="success-screen">
  <div class="checkmark">✓</div>
  <h2>החיבור הושלם בהצלחה!</h2>
  <p>כל הרשתות החברתיות חוברו. אתה יכול לסגור את החלון הזה.</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const jwtUrl = params.get('jwt');
  const successUrl = params.get('redirect');

  const loading = document.getElementById('loading-screen');
  const error = document.getElementById('error-screen');
  const main = document.getElementById('main');
  const success = document.getElementById('success-screen');
  const frame = document.getElementById('jwt-frame');
  const errorMsg = document.getElementById('error-msg');

  function show(el) {
    [loading, error, main, success].forEach(e => e.style.display = 'none');
    el.style.display = 'flex';
  }

  if (!jwtUrl) {
    errorMsg.textContent = 'לא נמצא קישור JWT בכתובת. אנא פנה לתמיכה.';
    show(error);
  } else {
    frame.src = jwtUrl;

    frame.addEventListener('load', () => {
      show(main);

      try {
        const frameUrl = frame.contentWindow.location.href;
        if (successUrl && frameUrl.includes(successUrl)) {
          show(success);
        }
      } catch(e) {}
    });

    frame.addEventListener('error', () => {
      errorMsg.textContent = 'אירעה שגיאה בטעינת ממשק החיבור.';
      show(error);
    });

    window.addEventListener('message', (e) => {
      if (e.data === 'redirect' || e.data?.type === 'redirect') {
        show(success);
      }
    });

    const checkInterval = setInterval(() => {
      try {
        const frameUrl = frame.contentWindow.location.href;
        if (successUrl && frameUrl.includes(successUrl)) {
          clearInterval(checkInterval);
          show(success);
        }
      } catch(e) {}
    }, 800);
  }
</script>
</body>
</html>
