<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero Work AI – החיבור הושלם</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d1f5c;
      --blue: #2563eb;
      --light-blue: #60a5fa;
      --bg: #f0f4ff;
    }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: var(--blue);
      top: -150px; right: -100px;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: var(--navy);
      bottom: -120px; left: -80px;
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(30px, 20px); }
    }
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(37,99,235,0.15);
      border-radius: 28px;
      padding: 52px 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(13,31,92,0.08), 0 1px 4px rgba(13,31,92,0.06);
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: translateY(28px);
      animation: rise 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    .check-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue) 0%, var(--light-blue) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.3);
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.7s both;
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .check-circle svg {
      width: 36px; height: 36px;
      stroke: white; stroke-width: 2.5;
      fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .check-path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw 0.4s ease 1.1s forwards;
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    h1 {
      font-size: 26px; font-weight: 700;
      color: var(--navy); line-height: 1.3;
      margin-bottom: 14px;
      opacity: 0;
      animation: fadein 0.6s ease 1s forwards;
    }
    p {
      font-size: 16px; font-weight: 300;
      color: #4a5b8a; line-height: 1.7;
      opacity: 0;
      animation: fadein 0.6s ease 1.2s forwards;
    }
    @keyframes fadein { to { opacity: 1; } }

    .divider {
      width: 48px; height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--light-blue));
      border-radius: 2px;
      margin: 20px auto 20px;
      opacity: 0;
      animation: fadein 0.6s ease 1.3s forwards;
    }

    .logo-bottom {
      margin-top: 32px;
      opacity: 0;
      animation: fadein 0.6s ease 1.5s forwards;
    }
    .logo-bottom img {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }
  </style>
</head>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="card">
    <div class="check-circle">
      <svg viewBox="0 0 24 24">
        <polyline class="check-path" points="4,13 9,18 20,7" />
      </svg>
    </div>
    <h1>החיבור הושלם בהצלחה! 🎉</h1>
    <div class="divider"></div>
